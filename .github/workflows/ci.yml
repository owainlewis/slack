name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        ghc: ["9.6", "9.8", "9.10", "9.12", "9.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: latest
      - run: cabal update
      - run: cabal build all
      - run: cabal test all
      - run: cabal haddock all
